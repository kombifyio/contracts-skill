name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-linux:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Metadata
        run: |
          python .github/scripts/quick_validate.py skill

      - name: Validate Example Contracts
        shell: pwsh
        run: |
          ./skill/scripts/validate-contracts.ps1 -Path "./examples/sample-project" -OutputFormat github-actions

      - name: Check PowerShell script syntax
        shell: pwsh
        run: |
          $paths = @(
            './installers/install.ps1',
            './skill/scripts/init-contracts.ps1'
          )
          foreach ($p in $paths) {
            $content = Get-Content $p -Raw
            [scriptblock]::Create($content) | Out-Null
            Write-Host "✅ $p syntax valid"
          }

      - name: Check minimal-ui JavaScript syntax
        shell: bash
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('skill/ui/minimal-ui/index.html','utf8');const m=h.match(/<script>([\\s\\S]*?)<\\/script>/i); if(!m) throw new Error('No <script> found'); new Function(m[1]); console.log('✅ minimal-ui JS syntax valid');"

  validate-windows:
    name: Validate (Windows)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Metadata
        run: |
          python .github/scripts/quick_validate.py skill

      - name: Validate Example Contracts
        shell: pwsh
        run: |
          ./skill/scripts/validate-contracts.ps1 -Path "./examples/sample-project" -OutputFormat github-actions

      - name: Check PowerShell script syntax
        shell: pwsh
        run: |
          $paths = @(
            './installers/install.ps1',
            './skill/scripts/init-contracts.ps1'
          )
          foreach ($p in $paths) {
            $content = Get-Content $p -Raw
            [scriptblock]::Create($content) | Out-Null
            Write-Host "✅ $p syntax valid"
          }

  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: PSScriptAnalyzer (installers + setup)
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer
          $paths = @(
            './installers/install.ps1',
            './skill/scripts/init-contracts.ps1'
          )
          $allIssues = @()
          foreach ($p in $paths) {
            $allIssues += Invoke-ScriptAnalyzer -Path $p -Severity Warning,Error -ExcludeRule PSAvoidUsingWriteHost,PSAvoidUsingEmptyCatchBlock,PSReviewUnusedParameter,PSUseShouldProcessForStateChangingFunctions
          }
          if ($allIssues) {
            $allIssues | Select-Object RuleName,Severity,ScriptName,Line,Message | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($allIssues.Count) issue(s)."
          }
          Write-Host '✅ PSScriptAnalyzer clean'

  lint-bash:
    name: Bash Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Bash Install Script Syntax
        run: |
          bash -n ./installers/install.sh
          bash -n ./skill/scripts/init-contracts.sh
          echo "✅ bash script syntax valid"

  ui-visual-regression:
    name: UI Visual Tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect UI visual test suite
        id: detect
        shell: pwsh
        run: |
          $requiredPaths = @(
            'package.json'
            'package-lock.json'
            'playwright.config.js'
            'tests/ui'
          )
          $hasUiSuite = $true
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              $hasUiSuite = $false
              break
            }
          }
          if ($hasUiSuite) {
            "enabled=true" >> $env:GITHUB_OUTPUT
            Write-Host '✅ UI visual test suite detected'
          } else {
            "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Host 'ℹ️ UI visual test suite not present in this slim repo export; skipping.'
          }

      - name: Setup Node
        if: steps.detect.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        if: steps.detect.outputs.enabled == 'true'
        run: npm ci

      - name: Install Playwright (Chromium)
        if: steps.detect.outputs.enabled == 'true'
        run: npx playwright install chromium

      - name: Run UI visual regression tests
        if: steps.detect.outputs.enabled == 'true'
        run: npm run test:ui

      - name: Skip UI visual regression tests
        if: steps.detect.outputs.enabled != 'true'
        shell: pwsh
        run: |
          Write-Host 'Skipping UI visual regression tests because this distribution repo does not ship the internal npm/Playwright harness.'

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
